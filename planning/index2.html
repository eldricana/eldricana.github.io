        <div class="nickname-generator">
            <h1>Wie bunnik?</h1>
            <label>Eerste letter voornaam:
                <input type="text" id="firstLetter" maxlength="1">
            </label><br>

            <label>Geboorte maand:
                <select id="birthMonth">
                    <option value="">Welk</option>
                    <option value="Januari">Januari</option>
                    <option value="Februari">Februari</option>
                    <option value="Maart">Maart</option>
                    <option value="April">April</option>
                    <option value="Mei">Mei</option>
                    <option value="Juni">Juni</option>
                    <option value="Juli">Juli</option>
                    <option value="Augustus">Augustus</option>
                    <option value="September">September</option>
                    <option value="Oktober">Oktober</option>
                    <option value="November">November</option>
                    <option value="December">December</option>
                </select>
            </label><br>

            <label>Geboorte dag:
                <input type="number" id="birthDay" min="1" max="31">
            </label><br><br>

            <button onclick="generateNickname()">Onthul mien identiteit</button>

            <p id="result" style="font-weight: bold; font-size: 1.8rem; color: rgb(231, 0, 150); margin-top: 1rem;"></p>

            <script>
                const adjectives = {
                    A: "kale",
                    B: "roekeloze",
                    C: "vettevingerige",
                    D: "Eldrikse",
                    E: "goed geoliede",
                    F: "alderbastende",
                    G: "sloerige",
                    H: "spekgladde",
                    I: "poar nemmende",
                    J: "agrarische",
                    K: "kakelverse",
                    L: "glibberige",
                    M: "Nieuw-Wehlse",
                    N: "schurende",
                    O: "onmundige",
                    P: "schoevende, snoevende",
                    Q: "",
                    R: "strukendukende",
                    S: "verheytoldijkse",
                    T: "moesmakende",
                    U: "kneiter knaaiende",
                    V: "certified boerende",
                    W: "stadse",
                    X: "",
                    Y: "oehoe oehoerende™",
                    Z: "snoei-klare"
                };

                const monthNouns = {
                    Januari: "smikkelbeer",
                    Februari: "gladiatorgenieter",
                    Maart: "kip mikkel",
                    April: "dreumes",
                    Mei: "papper en nathouder",
                    Juni: "drietlip",
                    Juli: "tinglijr",
                    Augustus: "spaaiqueen",
                    September: "beunhaas",
                    October: "smeerpiep",
                    November: "knasterd",
                    December: "slakkenfluusteraar"
                };

                const dayModifiers = [
                    "uut Nieuw-Wehl ofzo", "van de cannaval", "van Koenders", "uut de Beinum", "op de Sjon Deere",
                    "zunder de vrijheid van een fiets", "onderweg noar floephoes", "die een poar nemmt",
                    "met een mexicano in de spiekerboks", "met laxerende werking", "met sloerigheid in de rakkert", "die onder den draod deur vret",
                    "met een frikandelbroodje in de tes", "met schuurprobleemn", "die kneitert noch knaait", "met big knasterd energy",
                    "in de achterhoek arena", "en ie bunt er eentje van Koenders", "die kan spaaien als de beste",
                    "onderweg vanuut Zelhem", "en dokters haten ow", "van de cannaval", "met dremptse roets",
                    "en doesburg is van oew", "die gewoon met de handen wil warken", "met n veurliefde veur lauwe gladiator", "moar toch n mooie knasterd",
                    "met de klompn vol", "die zich mot wassen", "zwetend in sequoia", "en nou ist mooi gewes"
                ];

                function generateNickname() {
                    const firstLetter = document.getElementById("firstLetter").value.toUpperCase();
                    const birthMonth = document.getElementById("birthMonth").value;
                    const birthDay = parseInt(document.getElementById("birthDay").value);

                    if (firstLetter == "Q") {
                        document.getElementById("result").innerText = "Ophollen, oew noam begint nie met Q.";
                        return;
                    }

                    if (firstLetter == "X") {
                        document.getElementById("result").innerText = "Ophollen, oew noam begint nie met X.";
                        return;
                    }

                    if (!adjectives[firstLetter] || !monthNouns[birthMonth] || isNaN(birthDay)) {
                        document.getElementById("result").innerText = "Alles goed invuln knaap";
                        return;
                    }

                    const adjective = adjectives[firstLetter];
                    const noun = monthNouns[birthMonth];
                    const modifier = dayModifiers[(birthDay - 1) % dayModifiers.length];

                    const nickname = `${adjective} ${noun} ${modifier}`;
                    document.getElementById("result").innerText = `Ie bunt een ${nickname}`;
                }
            </script>
